<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose a Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 200px;
            padding: 10px;
            margin: 10px;
            font-size: 18px;
            color: white;
            background: #ff5722;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .btn:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Select a Page</h1>
    <a class="btn" id="page1" href="#">Page 1</a>
    <a class="btn" id="page2" href="#">Page 2</a>
    <a class="btn" id="page3" href="#">Page 3</a>
    <a class="btn" id="page4" href="#">Page 4</a>
</div>

<script>
    const port = window.location.port || "3000";
    document.getElementById("page4").href = `http://localhost:${port}/error-handling`;
    document.getElementById("page2").href = `http://localhost:${port}/micron2web`;
    document.getElementById("page1").href = `http://localhost:${port}/web`;
    document.getElementById("page3").href = `http://localhost:${port}/ui_micron_diagnosis`;
</script>

</body>
</html>
