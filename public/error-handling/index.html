<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error Logs Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="../media/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="error_styles.css">
    <link rel="stylesheet" href="description_styles.css">
    <link rel="stylesheet" href="commands_styles.css">

</head>

<body>

    <div class="dashboard-container">

        <!-- Header -->
        <header>
            <h1>Error Logs Dashboard</h1>
            <div class="header-right">

                <button id="monitorStartBtn" class="service-btn">
                    Start Monitoring
                </button>

                <button id="monitorStopBtn" class="service-btn">
                    Stop Monitoring
                </button>

                <!-- Open Monitor Button -->
                <button id="monitor-open-btn" class="monitor-open-btn">
                    Open ROS Monitor
                </button>

                <button id="open-terminal" class="header-btn">
                    <i class="fas fa-terminal"></i>
                    Launch Terminal
                </button>

                <button id="open-commands" class="header-btn">
                    <i class="fas fa-terminal"></i>
                    Commands
                </button>
                <button id="open-description" class="header-btn">
                    <i class="fas fa-file-alt"></i>
                    Description.txt
                </button>

                <!-- <span id="ros-status" class="ros-status disconnected">ROS Disconnected</span> -->
                <div id="digital-clock"></div>



            </div>
        </header>

        <!-- Main -->
        <main class="main-content">

            <!-- Terminal Section -->
            <section class="terminal-section">

                <!-- Header with Search -->
                <div class="terminal-header">
                    <h2>ROS2 Error Logs</h2>

                    <div class="log-search">
                        <input type="text" id="log-search-input" placeholder="Search logs..." />
                        <button id="clear-search" title="Clear search">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <div class="terminal-container">
                    <div id="terminal-display"></div>

                    <div class="terminal-controls">
                        <button id="clear-terminal" class="btn">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                        <button id="pause-terminal" class="btn">
                            <i class="fas fa-pause"></i> Pause
                        </button>
                        <button id="play-terminal" class="btn" disabled>
                            <i class="fas fa-play"></i> Play
                        </button>
                    </div>
                </div>
            </section>

            <!-- Placeholder -->
            <section class="terminal-section">

                <div class="terminal-header history-header">
                    <h2>Error History</h2>

                    <div class="history-controls">
                        <select id="limit-select">
                            <option value="100">Last 100</option>
                            <option value="200">Last 200</option>
                            <option value="500">Last 500</option>
                            <option value="1000">Last 1000</option>
                            <option value="2000">Last 2000</option>
                        </select>
                        <button id="reload-history" title="Reload">↻</button>
                        <input type="text" id="history-search" placeholder="Search…" />

                        <span id="history-count" class="history-count"></span>
                    </div>
                </div>

                <div class="error-history-container" id="error-history">
                    <div class="loading-text">Loading error logs…</div>
                </div>

            </section>



        </main>
    </div>
    <div id="description-modal" class="modal hidden">
        <div class="modal-content">

            <div class="modal-header">
                <h3>Error Description</h3>

                <div class="modal-actions">
                    <button id="edit-description" class="modal-btn">Edit</button>
                    <button id="save-description" class="modal-btn hidden">Save</button>
                    <button id="close-description" class="modal-close">&times;</button>
                </div>
            </div>

            <textarea id="description-text" class="modal-textarea" readonly></textarea>

        </div>
    </div>
    <div id="commands-modal" class="modal hidden">
        <div class="modal-content modal-wide">

            <div class="modal-header">
                <h3>Commands Notebook</h3>

                <div class="modal-actions">
                    <button id="add-text-cell" class="modal-btn">+ Text</button>
                    <button id="add-command-cell" class="modal-btn">+ Command</button>
                    <button id="save-commands" class="modal-btn primary">Save</button>
                    <button id="close-commands" class="modal-close">&times;</button>
                </div>
            </div>

            <div id="cells-container" class="cells-container"></div>

        </div>
    </div>



    <!-- Modal Overlay -->
    <div id="monitor-modal-overlay" class="monitor-modal-overlay hidden">

        <div class="monitor-modal">

            <div class="monitor-header">
                <span>ROS Node & Controller Monitor</span>
                <button id="monitor-close-btn" class="monitor-close-btn">✕</button>
            </div>

            <div class="monitor-status" id="monitor-ros-status">
                ROS: connecting...
            </div>

            <div class="monitor-section">
                <div class="monitor-title">Nodes</div>
                <div id="monitor-nodes" class="monitor-list"></div>
            </div>

            <div class="monitor-section">
                <div class="monitor-title">Controllers</div>
                <div id="monitor-controllers" class="monitor-list"></div>
            </div>

        </div>
    </div>



    <script src="script.js"></script>
    <!-- <script src="error_script.js"></script>
    <script src="description_script.js"></script>
    <script src="commands_script.js"></script> -->


</body>

</html>
