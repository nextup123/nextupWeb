<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Manager | Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="pm-page">
    <!-- Header -->
    <div class="pm-header">
      <h1>📁 Project Manager</h1>
      <div class="header-actions">
        <!-- <input
            type="text"
            id="searchInput"
            class="pm-search"
            placeholder="Search projects by name, owner..."
            autocomplete="off"
          /> -->
        <!-- <button id="newProjectBtn" class="primary">+ New Project</button> -->
      </div>
    </div>

    <!-- Active Project Section -->
    <div class="active-project-section" id="activeProjectSection">
      <h3>📌 CURRENT ACTIVE PROJECT</h3>
      <div id="projectDetails" class="project-details-grid">
        <div class="label">Loading...</div>
      </div>
    </div>
    <div class="project-actions">
      <div class="crud_buttons">

      <button class="action-btns primary create-project-btn">
        <div class="icon">＋</div>
        <div class="text">
          <div class="title">Create New Project</div>
          <div class="subtitle">Quick start</div>
        </div>
      </button>
       <button class="action-btns default-project-btn">
        <div class="icon">📄</div>
        <div class="text">
          <div class="title">Default Project</div>
          <div class="subtitle">Standard template</div>
        </div>
      </button>

      <button class="action-btns blank-project-btn">
        <div class="icon">📁</div>
        <div class="text">
          <div class="title">Blank Project</div>
          <div class="subtitle">Start from scratch</div>
        </div>
      </button>
      </div>
      <div class="save_buttons">

      <button class="action-btns primary save-project-btn">
        <div class="icon">💾</div>
        <div class="text">
          <div class="title">Save Project</div>
          <div class="subtitle">Persist changes</div>
        </div>
      </button>
      <button class="action-btns save-as-btn">
        <div class="icon">📝</div>
        <div class="text">
          <div class="title">Save As</div>
          <div class="subtitle">New project copy</div>
        </div>
      </button>
      </div>
     
    </div>
    <!-- Action Bar -->
    <div class="pm-actions">
      <div class="left-actions">
        <div class="sort-group">
          <span>Sort by:</span>
          <button data-sort="name" class="sort-btn active" id="sortName">
            Name
          </button>
          <button data-sort="date" class="sort-btn" id="sortDate">
            Last modified
          </button>
          <button data-sort="created" class="sort-btn" id="sortCreated">
            Created
          </button>
        </div>
      </div>
      <div>
        <span id="projectCount" style="font-size: 0.75rem; color: #475569">0 projects</span>
      </div>
    </div>

    <!-- Project Grid -->
    <div id="projectGrid" class="pm-grid">
      <div id="projectList" class="projectListContainer">
        📭 No projects yet. Click "New Project" to get started.
      </div>
      <!-- <div class="empty-state">📭 No projects yet. Click "New Project" to get started.</div> -->
    </div>
  </div>
  <div class="modal-overlay" id="createProjectModal">
    <div class="modal-box">
      <h3>Create New Project</h3>

      <form id="createProjectForm">
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="projectName" required />
        </div>

        <div class="form-group">
          <label>Owner</label>
          <input type="text" id="projectOwner" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="projectDescription"></textarea>
        </div>

        <div class="form-group">
          <label>Project Type</label>
          <select id="projectType">
            <option value="standard">standard</option>
            <option value="blank">blank</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" id="closeModal">Cancel</button>
          <button type="submit" class="primary">Create</button>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal-box">
      <p id="confirmText">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirmNo">Cancel</button>
        <button id="confirmYes" class="primary">Yes</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="inputModal">
    <div class="modal-box">
      <h3 id="inputTitle">Enter Value</h3>

      <input type="text" id="inputField" class="modal-input" placeholder="Enter name..." />
      <input type="text" id="inputOwnerField" class="modal-input" placeholder="Enter Owner name..." />
      <input type="text" id="inputDescField" class="modal-input" placeholder="Enter description..." />
      <div class="modal-actions">
        <button id="inputCancel">Cancel</button>
        <button id="inputOk" class="primary">Confirm</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="confirmDefaultModal">
    <div class="modal-box confirm-box">
      <div class="confirm-header">
        <span class="confirm-icon">⚠️</span>
        <h3 id="confirmTitle">Confirm Action</h3>
      </div>

      <p id="confirmMessage" class="confirm-message">Are you sure?</p>

      <div class="modal-actions">
        <button id="confirmCancel">Cancel</button>
        <button id="confirmOk" class="primary">Confirm</button>
      </div>
    </div>
  </div>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>

</html>
