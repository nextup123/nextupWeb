<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar Navbar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 170px; /* Adjusted for icons */
            height: 100vh;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
            transition: width 0.3s;
        }

        /* Expand sidebar on hover */
        .sidebar:hover {
            width: 180px;
        }

        /* Sidebar Buttons */
        .nav-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            white-space: nowrap;
        }

        .nav-button:hover, .nav-button.active {
            background-color: #ff6600;
        }

        .nav-button i {
            font-size: 20px;
            width: 40px;
            text-align: center;
        }

        /* Page Content (Maximizing Space) */
        .iframe-container {
            margin-left: 150px; /* Matches sidebar width */
            width: calc(100% - 150px);
            height: 100vh;
            position: absolute;
            top: 0;
            /* left: 170px; */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        iframe.active {
            display: block;
        }

    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <button class="nav-button active" onclick="switchPage('page1')">
            ⚙️<span>Robot Control</span>
        </button>
        <button class="nav-button" onclick="switchPage('page2')">
            🏠<span>Micron Control</span>
        </button>
        <button class="nav-button" onclick="switchPage('page3')">s
            📊<span>Diagnostics</span>
        </button>
        <button class="nav-button" onclick="switchPage('page4')">
            🔧 <span>Error Handling</span>
        </button>
    </div>

    <!-- Iframes (Load All Pages) -->
    <div class="iframe-container">
        <iframe id="page1" class="active"></iframe>
        <iframe id="page2"></iframe>
        <iframe id="page3"></iframe>
        <iframe id="page4"></iframe>
    </div>

    <script>
        const port = window.location.port || "3000";

        // Assign webpage sources
        document.getElementById("page1").src = `http://localhost:${port}/web`;
        document.getElementById("page2").src = `http://localhost:${port}/micron2web`;
        document.getElementById("page3").src = `http://localhost:${port}/ui_micron_diagnosis`;
        document.getElementById("page4").src = `http://localhost:${port}/error-handling`;

        function switchPage(pageId) {
            // Hide all iframes
            document.querySelectorAll("iframe").forEach(iframe => iframe.classList.remove("active"));
            // Show the selected one
            document.getElementById(pageId).classList.add("active");

            // Update active button
            document.querySelectorAll(".nav-button").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
        }
    </script>

</body>
</html>
