<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS 2 Logs Dashboard</title>
    <link rel="stylesheet" href="../media/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>ROS 2 Logs</span>
                </div>
                <div class="connection-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Disconnected: Auto connect is off</span>
                </div>
            </div>
            <div class="header-controls">
                <button class="control-btn" id="pauseBtn" title="Pause/Resume">
                    <i class="fas fa-play" id="pauseIcon"></i>
                </button>
                <button class="control-btn" id="clearBtn" title="Clear Logs">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="control-btn" id="exportBtn" title="Export Logs">
                    <i class="fas fa-download"></i>
                </button>
                <button class="control-btn primary" id="connectBtn" title="Connect/Disconnect">
                    <i class="fas fa-plug"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Search -->
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search logs...">
                        <button class="clear-search" id="clearSearch" title="Clear search">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- Level Filters -->
                <div class="filter-section">
                    <div class="section-header">
                        <h3>Log Levels</h3>
                        <div class="filter-controls">
                            <button class="icon-btn" id="showAllLevels" title="Show all levels">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="icon-btn" id="hideAllLevels" title="Hide all levels">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="level-filters" id="levelFilters"></div>
                </div>

                <!-- Node Filters -->
                <div class="filter-section">
                    <div class="section-header">
                        <h3>Nodes</h3>
                        <div class="filter-controls">
                            <button class="icon-btn" id="showAllNodes" title="Show all nodes">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="icon-btn" id="hideAllNodes" title="Hide all nodes">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                            <button class="icon-btn" id="showOnlyOneNode" title="Show only one node at a time">
                                <i class="fas fa-filter"></i>
                            </button>
                        </div>
                    </div>
                    <div class="search-box compact">
                        <i class="fas fa-search"></i>
                        <input type="text" id="nodeSearch" placeholder="Search nodes...">
                    </div>
                    <div class="node-filters-container">
                        <div class="node-filters" id="nodeFilters">
                            <!-- Nodes will be inserted here -->
                        </div>
                    </div>
                    <div class="node-count">
                        <span id="visibleNodesCount">0</span> of <span id="totalNodesCount">0</span> nodes visible
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-section">
                    <div class="stat-item">
                        <span class="stat-label">Total Logs</span>
                        <span class="stat-value" id="totalLogs">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Visible</span>
                        <span class="stat-value" id="visibleLogs">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Nodes</span>
                        <span class="stat-value" id="connectedNodes">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Rate</span>
                        <span class="stat-value" id="logRate">0/s</span>
                    </div>
                </div>
            </aside>

            <!-- Logs Panel -->
            <main class="logs-panel">
                <div class="logs-header">
                    <div class="logs-info">
                        <span>Showing <strong id="showingLogs">0</strong> of <strong id="totalLogsCount">0</strong> logs</span>
                        <span class="last-update">Last update: <span id="lastUpdate">-</span></span>
                    </div>
                    <div class="logs-controls">
                        <button class="icon-btn" id="autoScrollBtn" title="Auto-scroll">
                            <i class="fas fa-arrow-down" id="autoScrollIcon"></i>
                        </button>
                        <button class="icon-btn" id="wrapTextBtn" title="Wrap text">
                            <i class="fas fa-text-width"></i>
                        </button>
                        <button class="icon-btn" id="collapseAllBtn" title="Collapse all">
                            <i class="fas fa-compress-alt"></i>
                        </button>
                    </div>
                </div>
                
                <div class="logs-container" id="logsContainer">
                    <div class="no-logs" id="noLogsMessage">
                        <div class="no-logs-icon">
                            <i class="fas fa-terminal"></i>
                        </div>
                        <h3>No logs to display</h3>
                        <p>Connect to ROSBridge to start receiving logs</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-left">
                <span>ROS Bridge: <span id="bridgeUrl">ws://localhost:9090</span></span>
            </div>
            <div class="footer-right">
                <span class="memory-usage">Memory: <span id="memoryUsage">0 MB</span></span>
            </div>
        </footer>
    </div>

    <script src="roslib.js"></script>
    <script src="script.js"></script>
</body>
</html>
