<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Toastify Offline Test</title>

  <!-- LOCAL Toastify CSS -->
  <link rel="stylesheet" href="toastify.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 40px;
    }

    button {
      padding: 10px 16px;
      margin: 6px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
    }
  </style>
</head>

<body>

  <h2>🔔 Toastify (Offline)</h2>

  <button onclick="toast('Success', '#2ecc71')">Success</button>
  <button onclick="toast('Error', '#e74c3c')">Error</button>
  <button onclick="toast('Info', '#3498db')">Info</button>

  <!-- LOCAL Toastify JS -->
  <script src="toastify.min.js"></script>
  <script src="../error-handling/roslib.js"></script>

  <script>
    function toast(text, color) {
      Toastify({
        text,
        duration: 3000,
        gravity: "top",
        position: "right",
        close: true,
        backgroundColor: color
      }).showToast();
    }

    // Connect to ROSBridge
    const ros = new ROSLIB.Ros({
      url: 'ws://localhost:9090'
    });

    // Handle connection and errors
    ros.on('connection', () => console.log('Connected to ROSBridge'));
    ros.on('error', (error) => console.error('ROSBridge Error:', error));
    ros.on('close', () => console.log('Connection to ROSBridge closed'));

    function showToast(message, type = 'success', timeout = 3) {
      let background;

      switch (type) {
        case 'warn':
          background = '#f39c12';
          break;
        case 'failure':
          background = '#e74c3c';
          break;
        case 'success':
        default:
          background = '#2ecc71';
          break;
      }

      Toastify({
        text: message,
        duration: timeout * 1000,
        gravity: 'top',
        position: 'right',
        close: true,
        stopOnFocus: true,
        style: {
          background
        }
      }).showToast();
    }
    function clearAllToasts() {
      document
        .querySelectorAll('.toastify')
        .forEach(toast => toast.remove());
    }
    const toastTopic = new ROSLIB.Topic({
      ros: ros,
      name: '/bt_toast_popup',
      messageType: 'std_msgs/String'
    });

    toastTopic.subscribe((message) => {
      const content = message.data || '';
      const parts = content.split(',');

      if (parts.length === 0) return;

      const msg = parts[0].trim();
      const type = parts[1]?.trim().toLowerCase() || 'success';
      const timeout = parts[2] ? parseFloat(parts[2]) : 3;

      const validTypes = ['success', 'warn', 'failure'];
      const toastType = validTypes.includes(type) ? type : 'success';

      showToast(msg, toastType, timeout);
    });
    const startBtTopic = new ROSLIB.Topic({
      ros: ros,
      name: '/start_bt',
      messageType: 'std_msgs/Bool'
    });

    startBtTopic.subscribe(() => {
      clearAllToasts();
    });

  </script>

</body>

</html>
