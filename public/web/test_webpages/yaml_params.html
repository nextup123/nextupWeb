<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Data Display</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #data { padding: 10px; background: #f4f4f9; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>YAML Parameter Data</h1>
    <div id="data">Loading data...</div>

    <script>
        async function fetchYamlData() {
            try {
                const response = await fetch('http://localhost:8080/get_yaml');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('data').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    document.getElementById('data').innerHTML = "Error fetching data";
                }
            } catch (error) {
                document.getElementById('data').innerHTML = "Connection error";
            }
        }

        // Fetch data every 100ms
        setInterval(fetchYamlData, 100);
    </script>
</body>
</html>
