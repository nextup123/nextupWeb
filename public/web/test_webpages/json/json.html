<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Live Update</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            padding: 20px;
        }
        .param {
            padding: 10px;
            background-color: #444;
            margin-bottom: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Live JSON Data</h1>
    <div id="params-container"></div>

    <script>
        // Function to fetch JSON data and update the webpage
        function fetchJsonData() {
            fetch('http://localhost:8080/get_json')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('params-container');
                    container.innerHTML = '';  // Clear previous data

                    // Loop through JSON keys and display each value
                    Object.keys(data).forEach(param => {
                        const paramDiv = document.createElement('div');
                        paramDiv.classList.add('param');
                        paramDiv.textContent = `${param}: ${data[param]}`;
                        container.appendChild(paramDiv);
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                });
        }

        // Call the function every 100ms to update the page
        setInterval(fetchJsonData, 100);
    </script>
</body>
</html>
