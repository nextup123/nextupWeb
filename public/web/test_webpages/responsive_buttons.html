<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Container with Buttons</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            background-color: #ffffff;
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 800px;
            height: 60%;
            max-height: 500px;
            padding: 20px;
        }

        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: teal;
            color: white;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: darkorange;
            transform: scale(1.05);
        }

        /* Responsive sizes for buttons */
        .button {
            width: calc(30% - 10px); /* Adjust button width relative to container */
            height: 15%; /* Adjust button height relative to container */
            margin: 10px;
        }

        @media (max-width: 768px) {
            .button {
                width: calc(45% - 10px);
                height: 20%;
            }
        }

        @media (max-width: 480px) {
            .button {
                width: calc(90% - 10px);
                height: 15%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="button">Button 1</div>
        <div class="button">Button 2</div>
        <div class="button">Button 3</div>
        <div class="button">Button 4</div>
        <div class="button">Button 5</div>
        <div class="button">Button 6</div>
    </div>
</body>
</html>
