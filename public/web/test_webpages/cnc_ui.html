<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Chuck Control</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(#e4e9ec, #ece2e2);
        }

        .cnc-cntainer {
            width: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(116, 141, 137);
            margin: 20px;
        }

        /* Container for the chuck */
        .chuck-container {
            width: 250px;
            height: 250px;
            position: relative;
            margin: 50px auto;
        }

        /* Chuck base (outer circle) */
        .chuck {
            width: 100%;
            height: 100%;
            border: 10px solid #333;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            animation: none;
            background-color: #000000;

            /* Spinning animation will be added dynamically */
        }

        /* Chuck segments (3 parts) */
        .segment {
            width: 100%;
            height: 100%;
            position: absolute;
            clip-path: polygon(50% 50%, 100% 30%, 100% 80%);
            background-color: yellow;

            transform-origin: 50% 50%;
            transition: transform 0.5s ease-in-out;
        }

        /* Position each segment */
        .segment1 {
            transform: rotate(0deg);
        }

        .segment2 {
            transform: rotate(120deg);
        }

        .segment3 {
            transform: rotate(240deg);
        }

        .chuck.open .segment1 {
            transform: translate(-10px, -10px);
        }

        .chuck.open .segment2 {
            transform: translate(10px, -10px);
        }

        .chuck.open .segment3 {
            transform: translate(0px, 15px);
        }

        .chuck.close .segment1 {
            transform: translate(0px, 0px);
        }

        .chuck.close .segment2 {
            transform: translate(0px, 0px);
        }

        .chuck.close .segment3 {
            transform: translate(0px, 0px);
        }

        /* CNC Gate */
        .cnc-gate {
            width: 130%;
            height: 110%;
            background: rgba(100, 100, 100, 0.5);
            color: aliceblue;
            position: absolute;
            top: 0;
            left: -10%;
            transition: transform 2.5s ease-in-out;
            backdrop-filter: blur(3px);
            border: 4px double rgb(63, 25, 11);
            z-index: 2;
        }

        .gate-open {
            transform: translateX(-95%);
        }

        .gate-closed {
            transform: translateX(0);
        }

        /* Spinning animation */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Controls */
        .controls {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(rgb(65, 181, 179), rgb(0, 255, 195));
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="cnc-cntainer">
        <div class="chuck-container">
            <div class="cnc-gate gate-closed" id="cncGate">CNC GATE</div>
            <div class="chuck" id="chuck">
                <div class="segment segment1"></div>
                <div class="segment segment2"></div>
                <div class="segment segment3"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="chuckToggle">Chuck Toggle</button>
        <button id="startCNC">Start CNC</button>
        <button id="gateToggle">Open/Close Gate</button>
    </div>
    <script src="roslib.js"></script>
    <script>
        // Connect to ROSBridge
        const ros = new ROSLIB.Ros({
            url: 'ws://localhost:9090'
        });

        ros.on('connection', () => {
            console.log('Connected to ROSBridge');
        });

        ros.on('error', (error) => {
            console.log('Error connecting to ROSBridge: ', error);
        });

        ros.on('close', () => {
            console.log('Connection to ROSBridge closed');
        });

        const chuckBitsTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/digital_input_bits',
            messageType: 'std_msgs/Int32MultiArray'
        });

        chuckToggleTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/nextup_digital_output_controller_2/commands',
            messageType: 'nextup_joint_interfaces/NextupDigitalOutputs'
        })

        startCNCTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/nextup_digital_output_controller_4/commands',
            messageType: 'nextup_joint_interfaces/NextupDigitalOutputs'
        })

        gateCNCTopic = new ROSLIB.Topic({
            ros: ros, 
            name: '/nextup_digital_output_controller_3/commands',
            messageType: 'nextup_joint_interfaces/NextupDigitalOutputs'
        })

        const gateStatusTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/cnc_gate_status',
            messageType: 'std_msgs/Bool'
        });

        const gateToggleTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/cnc_gate_command',
            messageType: 'std_msgs/Bool'
        });

        document.getElementById('chuckToggle').addEventListener('click', () => {
            sendPulse(chuckToggleTopic, 1);

            // const msg = new ROSLIB.Message({
            //     do1: [true]
            // });
            // chuckToggleTopic.publish(msg);

            // setTimeout(() => {
            //     msg.do1 = [false];
            //     chuckToggleTopic.publish(msg);
            // }, 250);
        });

        document.getElementById('startCNC').addEventListener('click', () => {
            sendPulse(startCNCTopic, 1);

            // const msg = new ROSLIB.Message({
            //     do1: [true]
            // });
            // startCNCTopic.publish(msg);

            // setTimeout(() => {
            //     msg.do1 = [false];
            //     startCNCTopic.publish(msg);
            // }, 250);
        });

        document.getElementById('gateToggle').addEventListener('click', () => {
            sendPulse(gateCNCTopic, 1);
        });

        function sendPulse(rosTriggerTopic, idx){
            if (idx == 1){
                const msg = new ROSLIB.Message({
                    do1: [true]
                });
                rosTriggerTopic.publish(msg);

                setTimeout(() => {
                    msg.do1 = [false];
                    rosTriggerTopic.publish(msg);
                }, 250);
            }
            else if (idx == 2){
                const msg = new ROSLIB.Message({
                    do2: [true]
                });
                rosTriggerTopic.publish(msg);

                setTimeout(() => {
                    msg.do2 = [false];
                    rosTriggerTopic.publish(msg);
                }, 250);
            }
            else if (idx == 3){
                const msg = new ROSLIB.Message({
                    do3: [true]
                });

                rosTriggerTopic.publish(msg);

                setTimeout(() => {
                    msg.do3 = [false];
                    rosTriggerTopic.publish(msg);
                }, 250);
            }          
        }

        // gateStatusTopic.subscribe((message) => {
        //     let gate_state = message.data;
            // if (gate_state !== gate_last_state) {
            //     gate_state ? openGate() : closeGate();
            //     gate_last_state = gate_state;
            // }
        // });

        let chuck_last_state, cnc_last_state, gate_last_state;

        chuckBitsTopic.subscribe((message) => {
            var chuck_state = message.data[1];
            var cnc_state = message.data[2];
            var door_open_state = message.data[5];
            var door_close_state = message.data[6];


            if (chuck_state) openChuck();
            else closeChuck();

            if (cnc_state) spinChuck();
            else stopChuck();

            if(door_open_state && !door_close_state) openGate();
            else if(!door_open_state && door_close_state) closeGate();
            
        });


        function openChuck() {
            document.querySelector('.segment1').style.transform = 'rotate(0deg) translateX(20px)';
            document.querySelector('.segment2').style.transform = 'rotate(120deg) translateX(20px)';
            document.querySelector('.segment3').style.transform = 'rotate(240deg) translateX(20px)';
        }

        function closeChuck() {
            document.querySelector('.segment1').style.transform = 'rotate(0deg)';
            document.querySelector('.segment2').style.transform = 'rotate(120deg)';
            document.querySelector('.segment3').style.transform = 'rotate(240deg)';
        }


        function spinChuck() {
            const chuck = document.getElementById('chuck');
            chuck.style.animation = 'spin 2s linear infinite';
        }

        function stopChuck() {
            const chuck = document.getElementById('chuck');
            chuck.style.animation = 'none';
        }


        function openGate() {
            document.getElementById('cncGate').classList.remove('gate-closed');
            document.getElementById('cncGate').classList.add('gate-open');
        }

        function closeGate() {
            document.getElementById('cncGate').classList.remove('gate-open');
            document.getElementById('cncGate').classList.add('gate-closed');
        }
    </script>
</body>

</html>
