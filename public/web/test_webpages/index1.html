<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTUP ROBOTICS</title>
    <link rel="stylesheet" href="styles/style1.css">
    <link rel="icon" href="./image/favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>NEXTUP ROBOTICS</h1>
    <div class="container">
        <div class="img">
            <img src="./image/Arm.webp" alt="Robot Arm"/>
        </div>
        <h2>SERVO NODE CONTROLLER</h2>
        <div class="columns">
            <div class="additional-column">
                <hr>
                <div class="button-item">
                    <input type="text" id="path_input" placeholder="Enter path name" class="input-field">
                    <button class="btn btnpush" id="add_path">Add Path</button>
                </div>                
                <hr>
                <div class="button-item">
                    <button class="btn btnpush" id="clear_last">Clear Last</button>
                </div>
                <hr>
                <div class="button-item">
                    <button class="btn btnpush" id="clear_all">Clear All</button>
                </div>
                <hr>
                <div class="button-item">
                    <button class="btn btnpush" id="execute">Execute</button>
                </div>
                <hr>
                <div class="button-item">
                    <button class="btn btnpush" id="repeat">Repeat</button>
                </div>
                <hr>
                <div class="button-item">
                    <button class="btn btnpush" id="default">Default</button>
                </div>
                <hr>
            </div>
            <div class="vertical-line"></div>
            <div class="column column-left">
                <div class="join-item">
                    <label class="join_name" for="join1">Joint 1:</label>
                    <button class="btn btnplus" id="j1_plus">+</button>
                    <button class="btn btnminus" id="j1_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="join2">Joint 2:</label>
                    <button class="btn btnplus" id="j2_plus">+</button>
                    <button class="btn btnminus" id="j2_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="join3">Joint 3:</label>
                    <button class="btn btnplus" id="j3_plus">+</button>
                    <button class="btn btnminus" id="j3_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="join4">Joint 4:</label>
                    <button class="btn btnplus" id="j4_plus">+</button>
                    <button class="btn btnminus" id="j4_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="join5">Joint 5:</label>
                    <button class="btn btnplus" id="j5_plus">+</button>
                    <button class="btn btnminus" id="j5_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="join6">Joint 6:</label>
                    <button class="btn btnplus" id="j6_plus">+</button>
                    <button class="btn btnminus" id="j6_minus">-</button>
                </div>
            </div>
            <div class="vertical-line"></div>
            <div class="column column-right">
                <div class="join-item">
                    <label class="join_name" for="x">X:</label>
                    <button class="btn btnplus" id="cx_plus">+</button>
                    <button class="btn btnminus" id="cx_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="y">Y:</label>
                    <button class="btn btnplus" id="cy_plus">+</button>
                    <button class="btn btnminus" id="cy_minus">-</button>
                </div>
                <div class="join-item">
                    <label class="join_name" for="z">Z:</label>
                    <button class="btn btnplus" id="cz_plus">+</button>
                    <button class="btn btnminus" id="cz_minus">-</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
    <script src="scripts/script.js"></script>
    <script src="scripts/path_commands.js"></script>
</body>
</html>
