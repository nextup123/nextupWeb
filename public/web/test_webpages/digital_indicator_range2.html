<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Indicator Range</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #1d1515, #2c3e50);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .digital-indicator-button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #007bff, #00bfff);
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .digital-indicator-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .digital-indicator-popup {
            font-size: 18px;
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 340px;
        }

        .digital-indicator-popup input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .digital-indicator-popup input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .digital-indicator-close-btn {
            background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            width: 90%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .digital-indicator-close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 0, 0, 0.3);
        }

        .digital-indicator-update-btn {
            background: linear-gradient(135deg, #00cc66, #00b359);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            width: 90%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .digital-indicator-update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 255, 0, 0.3);
        }

        .digital-indicator-refresh-btn {
            background: linear-gradient(135deg, #6db319, #8bc34a);
            color: white;
            border: none;
            padding: 5px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            width: 50%;
            height: 40px;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .digital-indicator-refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(109, 173, 25, 0.3);
        }

        #digital-indicator-current-min,
        #digital-indicator-current-max {
            color: #00bfff;
            font-weight: bold;
        }

        #digital-indicator-status-msg {
            margin-top: 20px;
            font-size: 16px;
            color: #ffcc00;
        }

    </style>
</head>

<body>

    <button class="digital-indicator-button" onclick="openDigitalIndicatorPopup()">Digital Indicator Range</button>

    <div id="digital-indicator-popup" class="digital-indicator-popup">
        <h3>Current Range</h3>
        <p>Min: <span id="digital-indicator-current-min">--</span> Max: <span
                id="digital-indicator-current-max">--</span></p>
        <button class="digital-indicator-refresh-btn" onclick="getDigitalIndicatorCurrentRange()">Refresh🔄</button>
        <h3>Update Range</h3>
        <input type="number" id="digital-indicator-new-min" step="0.001" placeholder="Min Value">
        <input type="number" id="digital-indicator-new-max" step="0.001" placeholder="Max Value">

        <br><br>
        <button class="digital-indicator-update-btn" onclick="updateDigitalIndicatorRange()">Update</button>
        <button class="digital-indicator-close-btn" onclick="closeDigitalIndicatorPopup()">Close</button>

        <p id="digital-indicator-status-msg"></p>
    </div>
    <script src="roslib.js"></script>
    <script>
        var ros = new ROSLIB.Ros({
            url: "ws://localhost:9090"  // Connect to ROSBridge
        });

        function openDigitalIndicatorPopup() {
            getDigitalIndicatorCurrentRange();
            document.getElementById("digital-indicator-popup").style.display = "block";
        }

        function closeDigitalIndicatorPopup() {
            document.getElementById("digital-indicator-popup").style.display = "none";
        }

        function getDigitalIndicatorCurrentRange() {
            console.log("getting current range...");
            
            var getService = new ROSLIB.Service({
                ros: ros,
                name: "/get_range",
                serviceType: "nextup_joint_interfaces/srv/GetRange"
            });

            var request = new ROSLIB.ServiceRequest({});
            getService.callService(request, function (response) {
                document.getElementById("digital-indicator-current-min").innerText = response.min.toFixed(3);
                document.getElementById("digital-indicator-current-max").innerText = response.max.toFixed(3);
                
            });
        }

        function updateDigitalIndicatorRange() {
            console.log("updating current range...");

            var minVal = parseFloat(document.getElementById("digital-indicator-new-min").value);
            var maxVal = parseFloat(document.getElementById("digital-indicator-new-max").value);

            if (isNaN(minVal) || isNaN(maxVal)) {
                document.getElementById("digital-indicator-status-msg").innerText = "❌ Please enter valid numbers!";
                
                return;
            }

            if (minVal >= maxVal) {
                document.getElementById("digital-indicator-status-msg").innerText = "❌ Min value must be less than Max value!";
                
                return;
            }

            var updateService = new ROSLIB.Service({
                ros: ros,
                name: "/update_range",
                serviceType: "nextup_joint_interfaces/srv/UpdateRange"
            });

            var request = new ROSLIB.ServiceRequest({ min: minVal, max: maxVal });

            updateService.callService(request, function (response) {
                if (response.success) {
                    document.getElementById("digital-indicator-status-msg").innerText = "✅ Update Successful!";
                    getDigitalIndicatorCurrentRange();
                } else {
                    document.getElementById("digital-indicator-status-msg").innerText = "❌ Update Failed!";
                }
                
            });
        }
    </script>

</body>

</html>
