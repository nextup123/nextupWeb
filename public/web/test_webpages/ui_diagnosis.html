<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotics Dashboard</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #121212;
            color: #f1f1f1;
            font-family: 'Roboto', sans-serif;
        }
        .robot-title {
            font-size: 2rem;
            color: #ff7f50;
            text-align: center;
            margin-bottom: 30px;
        }
        .unit-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff7f50;
            padding-bottom: 10px;
        }
        .unit {
            text-align: center;
            font-size: 1.5rem;
        }
        .vertical-divider {
            border-left: 2px solid #ff7f50;
            height: 100%;
            margin: 0 15px;
        }
        .spm-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 10px;
        }
        .spm {
            text-align: center;
            font-size: 1.2rem;
            color: #a0a0a0;
            padding: 5px 10px;
        }
        .led-label {
            color: #e44308;
            text-align: center;
            margin-bottom: 5px;
            margin-top: 5px;
            background-color: #74430b33;
            border-radius: 5px;
            max-width: 90%;
            max-height: 2px;
            transform: translate(5%);
        }
        .label-text{
            font-size: 1.4rem;
            max-width: 26%;
            max-height: 32px;
            background-color: #c5bdbb;
            border-radius: 15px;
            transform: translate(142%);
        }
        .label-text:hover{
            font-size: 1.3rem;
            max-width: 26%;
            max-height: 32px;
            background-color: #8a736d;
            border-radius: 15px;
            transform: translate(142%);
        }
        .led-row {
            display: flex;  
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 15px;
            gap: 10px;
        }
        .indicator {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s ease, border 0.3s ease;
        }
        .indicator-true {
            background-color: limegreen;
            border: 2px solid #00ff00;
            box-shadow: 0px 0px 10px rgba(243, 228, 13, 0.8);

        }
        .indicator-false {
            background-color: crimson;
            border: 2px solid #ff0000;
            box-shadow: 0px 0px 10px rgba(243, 105, 13, 0.8);
        }
        .indicator:hover {
            transform: scale(1.2);
            cursor: pointer;
        }

        /*       slider       */
        .slider-row{
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
            gap: 20%;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .slider-wrapper {
            position: relative;
            width: 350px;
            height: 30px;
        }

        .actuator {
            position: absolute;
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.6), 0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .slider {
            position: absolute;
            height: 25px;
            width: 20px;
            background: linear-gradient(145deg, #555, #888);
            border-radius: 8px;
            transition: left 0.02s ease-in-out;
        }

        .slider[data-index="0"], .slider[data-index="2"] {
            background: linear-gradient(145deg, #007bff, #00d4ff);
            box-shadow: inset -2px -2px 5px rgba(255, 255, 255, 0.2),
                        inset 3px 3px 8px rgba(0, 0, 0, 0.6),
                        2px 2px 8px rgba(0, 123, 255, 0.7);
        }

        .slider[data-index="1"], .slider[data-index="3"] {
            background: linear-gradient(145deg, #ff4c4c, #ff7070);
            box-shadow: inset -2px -2px 5px rgba(255, 255, 255, 0.2),
                        inset 3px 3px 8px rgba(0, 0, 0, 0.6),
                        2px 2px 8px rgba(255, 76, 76, 0.7);
        }

        .grip {
            position: absolute;
            width: 12px;
            height: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            border-radius: 50%;
            box-shadow: inset 0 -2px 3px rgba(0, 0, 0, 0.6),
                        inset 0 2px 3px rgba(255, 255, 255, 0.2);
        }

        .min-max-labels {
            display: flex;
            justify-content: space-between;
            width: 350px;
            /* margin-top: 5px; */
            font-size: 12px;
            color: #aaa;
        }

        .value-display {
            font-size: 20px;
            color: #00ffaa;
            text-shadow: 0px 0px 5px rgba(0, 255, 170, 0.8);    
        }

        /* Positioning for the LED indicators (just an example layout) */
        .led-indicators {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #aaa;
        }

        .led.active {
            background-color: #00ff00;
        }

        .led.inactive {
            background-color: #ff0000;
        }

        .hydraulic-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 50px;
        }

        .hydraulic-stand {
            width: 40px;
            height: 95px;
            background: linear-gradient(180deg, #a09d9d 0%, #e7e5e5 100%);
            border-radius: 10px;
            border: 2px solid black;
            position: relative;
        }

        .rod {
            width: 10px;
            height: 100px;
            background: linear-gradient(180deg, #302a2a 0%, #333131 100%);
            position: absolute;
            left: 15px;
            border-radius: 5px;
            transition: top 0.1s ease;
        }

        .end-effector {
            width: 40px;
            height: 50px;
            background: linear-gradient(180deg, #b8b1b1 0%, #b1aaaa 80%);
            position: absolute;
            top: 95px;
            border-radius: 5px;
            transition: top 0.1s ease;
        }

        .magnet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .magnet {
            width: 60px;
            height: 30px;
            background-color: #ccc6c5;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
            border: 3px solid rgb(146, 141, 141);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .iron-piece {
            width: 50px;
            height: 5px;
            background-color: #5e5a5a;
            border-radius: 5px;
            position: relative;
            top: 0;
            transition: top 0.05s ease-in-out;
        }
        
    </style>
    
</head>
<body>
    <div class="container mt-5">
        <h1 class="robot-title">Robotics Dashboard</h1>

        <!-- Units and SPM Layout -->
        <div class="unit-container">
            <div class="unit">UNIT 1</div>
            <div class="vertical-divider"></div>
            <div class="unit">UNIT 2</div>
        </div>
        <div class="spm-container">
            <div class="spm">SPM1</div>
            <div class="spm">SPM2</div>
            <div class="vertical-divider"></div>
            <div class="spm">SPM3</div>
            <div class="spm">SPM4</div>
        </div>


        <div class="led-label">
            <div class="label-text">OPERATIONAL STATUS</div>
        </div>
        <div class="led-row">
            <div id="spm1-led-op" class="indicator indicator-false"></div>
            <div id="spm2-led-op" class="indicator indicator-false"></div>
            <div class="vertical-divider"></div>
            <div id="spm3-led-op" class="indicator indicator-false"></div>
            <div id="spm4-led-op" class="indicator indicator-false"></div>
        </div>

        <div class="led-label">
            <div class="label-text">HOMING STATUS</div>
        </div>
        <div class="led-row">
            <div id="spm1-led" class="indicator indicator-false"></div>
            <div id="spm2-led" class="indicator indicator-false"></div>
            <div class="vertical-divider"></div>
            <div id="spm3-led" class="indicator indicator-false"></div>
            <div id="spm4-led" class="indicator indicator-false"></div>
        </div>

        <div class="led-label">
            <div class="label-text">RUNNING STATUS</div>
        </div>

        <div class="slider-row">
            <div class="slider-group">
                <h3>RING SLOTTER</h2>
                <div class="slider-wrapper">
                    <div class="actuator"></div>
                    <div class="slider" id="slider-0" data-index="0" style="left: 0%;">
                        <div class="grip"></div>
                    </div>
                </div>
                <div class="min-max-labels">
                    <span>0</span>
                    <span>20000</span>
                </div>
                <div class="value-display" id="value-0">0</div>
            </div>
            <div class="slider-group">
                <h3>RING SLOTTER</h2>
                <div class="slider-wrapper">
                    <div class="actuator"></div>
                    <div class="slider" id="slider-2" data-index="2" style="left: 0%;">
                        <div class="grip"></div>
                    </div>
                </div>
                <div class="min-max-labels">
                    <span>0</span>
                    <span>20000</span>
                </div>
                <div class="value-display" id="value-2">0</div>
          </div>
        </div>
        <div class="slider-row">
            <div class="slider-group">
                <h3>RING COLLECTOR</h2>
                <div class="slider-wrapper">
                    <div class="actuator"></div>
                    <div class="slider" id="slider-1" data-index="1" style="left: 0%;">
                        <div class="grip"></div>
                    </div>
                </div>
                <div class="min-max-labels">
                    <span>0</span>
                    <span>12000</span>
                </div>
                <div class="value-display" id="value-1">0</div>
            </div>
            <div class="slider-group">
                <h3>RING COLLECTOR</h2>
                <div class="slider-wrapper">
                    <div class="actuator"></div>
                    <div class="slider" id="slider-3" data-index="3" style="left: 0%;">
                        <div class="grip"></div>
                    </div>
                </div>
                <div class="min-max-labels">
                    <span>0</span>
                    <span>12000</span>
                </div>
                <div class="value-display" id="value-3">0</div>
            </div>
        </div>
        <div class="led-label">
            <div class="label-text">ACTUATORS STATUS</div>
        </div>
        <div class="slider-row">
            <div class="slider-row">
        <div class="hydraulic-container">
            <div class="hydraulic-stand">
                <div class="rod" id="rod1"></div>
                <div class="end-effector" id="endEffector1"></div>
            </div>
                </div>
                
                <div class="magnet-container">
                    <div class="magnet" id="magnet1">OFF</div>
                    <div class="iron-piece" id="ironPiece1"></div>
                </div>
            </div>
            <div class="slider-row">
                <div class="hydraulic-container">
                    <div class="hydraulic-stand">
                        <div class="rod" id="rod2"></div>
                        <div class="end-effector" id="endEffector2"></div>
                    </div>
                </div>

                <div class="magnet-container">
                    <div class="magnet" id="magnet2">OFF</div>
                    <div class="iron-piece" id="ironPiece2"></div>
                </div>
            </div>
        </div>
    
    </div>

    <!-- ROSLIB.js -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1.0.0/build/roslib.min.js"></script>

    <script>
      // Connect to ROS
      const ros = new ROSLIB.Ros({
            url: 'ws://localhost:9090' // Replace with your rosbridge websocket URL
        });

        ros.on('connection', () => {
            console.log('Connected to rosbridge');
        });

        ros.on('error', (error) => {
            console.error('Error connecting to rosbridge:', error);
        });

        ros.on('close', () => {
            console.log('Connection to rosbridge closed.');
        });

        // Subscribe to the /homing_status_cobot_spm topic
        const homingStatusTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/homing_status_cobot_spm', // Your topic name
            messageType: 'nextup_joint_interfaces/msg/HomingStatusCobotSpm' // Custom message type
        });

        // Callback to update LED indicators
        homingStatusTopic.subscribe((message) => {
            // Update LED for SPM1 (rs_1_homed)
            document.getElementById('spm1-led-op').className = message.rs_1_homed
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM2 (rc_1_homed)
            document.getElementById('spm2-led-op').className = message.rc_1_homed
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM3 (rs_2_homed)
            document.getElementById('spm3-led-op').className = message.rs_2_homed
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM4 (rc_2_homed)
            document.getElementById('spm4-led-op').className = message.rc_2_homed
                ? 'indicator indicator-true'
                : 'indicator indicator-false';
        });

        const opStatusTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/is_operational_state', // Your topic name
            messageType: 'nextup_joint_interfaces/msg/OperationalStatusSpm' // Custom message type
        });

        opStatusTopic.subscribe((message) => {
            // Update LED for SPM1 (rs_1_homed)
            document.getElementById('spm1-led').className = message.rs_1_op
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM2 (rc_1_homed)
            document.getElementById('spm2-led').className = message.rc_1_op
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM3 (rs_2_homed)
            document.getElementById('spm3-led').className = message.rs_2_op
                ? 'indicator indicator-true'
                : 'indicator indicator-false';

            // Update LED for SPM4 (rc_2_homed)
            document.getElementById('spm4-led').className = message.rc_2_op
                ? 'indicator indicator-true'
                : 'indicator indicator-false';
        });

        
        // Subscribe to /nextup_joint_states topic
        const topic = new ROSLIB.Topic({
            ros: ros,
            name: '/nextup_joint_states',
            messageType: 'nextup_joint_interfaces/msg/NextupJointState'
        });
        
        const sliders = {
            0: { element: document.getElementById('slider-0'), valueDisplay: document.getElementById('value-0'), min: 0, max: 20000 },
            1: { element: document.getElementById('slider-1'), valueDisplay: document.getElementById('value-1'), min: 0, max: 12000 },
            2: { element: document.getElementById('slider-2'), valueDisplay: document.getElementById('value-2'), min: 0, max: 20000 },
            3: { element: document.getElementById('slider-3'), valueDisplay: document.getElementById('value-3'), min: 0, max: 12000 }
        };
        
        function updateSlider(index, value) {
            const slider = sliders[index];
            const clampedValue = Math.max(slider.min, Math.min(value, slider.max)); // Clamp the value between min and max for each slider
            const percentage = ((clampedValue - slider.min) / (slider.max - slider.min)) * 100; // Convert the value to a percentage
            slider.element.style.left = percentage + '%'; // Update the slider position
            slider.valueDisplay.innerText = clampedValue.toFixed(2); // Display the value
        }
        
        // Subscribe to the topic to get joint state data
        topic.subscribe((message) => {
            // Extract the positions from index 1 to 4
            const jointPositions = message.position.slice(1, 5); // Get positions from index 1 to 4
        
            // Update the sliders with the position values
            jointPositions.forEach((position, index) => {
                if (index < 4) {
                    updateSlider(index, position); // Update slider position for indices 0 to 3
                }
            });
        });

     // Hydraulic and Magnet Control Functions for Actuator 1 (First Pair)
     const magnet1 = document.getElementById('magnet1');
        const ironPiece1 = document.getElementById('ironPiece1');
        const rod1 = document.getElementById('rod1');
        const endEffector1 = document.getElementById('endEffector1');

        // Hydraulic and Magnet Control Functions for Actuator 2 (Second Pair)
        const magnet2 = document.getElementById('magnet2');
        const ironPiece2 = document.getElementById('ironPiece2');
        const rod2 = document.getElementById('rod2');
        const endEffector2 = document.getElementById('endEffector2');

        // Subscriber for the first topic
        const listener1 = new ROSLIB.Topic({
            ros: ros,
            name: '/nextup_digital_output_controller_spm_1/commands',
            messageType: 'nextup_joint_interfaces/msg/NextupDigitalOutputs'
        });

        // Subscriber for the second topic
        const listener2 = new ROSLIB.Topic({
            ros: ros,
            name: '/nextup_digital_output_controller_spm_2/commands',
            messageType: 'nextup_joint_interfaces/msg/NextupDigitalOutputs'
        });

        // Function to handle actuator control (for both actuators)
        function controlActuator(message, magnet, ironPiece, rod, endEffector) {
            const do1 = message.do1; // Electromagnet control
            const do2 = message.do2; // Hydraulic control

            // Handle Electromagnet (do1)
            if (do1[0]) {
                ironPiece.style.top = '-10px'; // Move iron piece towards magnet
                magnet.style.backgroundColor = '#be450d';
                magnet.textContent = 'ON';
            } else {
                ironPiece.style.top = '0px'; // Iron piece moves back down
                magnet.style.backgroundColor = '#ccc6c5';
                magnet.textContent = 'OFF';
            }

            // Handle Hydraulic (do2)
            if (do2[0]) {
                rod.style.top = '55px'; // Rod moves down
                endEffector.style.top = '150px'; // End-effector moves down
            } else {
                rod.style.top = '0px'; // Rod moves back up
                endEffector.style.top = '95px'; // End-effector moves back up
            }
        }

        // Subscribe to first actuator pair (SPM 1)
        listener1.subscribe((message) => {
            controlActuator(message, magnet1, ironPiece1, rod1, endEffector1);
        });

        // Subscribe to second actuator pair (SPM 2)
        listener2.subscribe((message) => {
            controlActuator(message, magnet2, ironPiece2, rod2, endEffector2);
        });

        // Handle WebSocket connection errors
        ros.on('error', (error) => {
            console.log('Error connecting to WebSocket:', error);
        });
    </script>
</body>
</html>
