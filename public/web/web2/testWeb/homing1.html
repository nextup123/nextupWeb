<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMING Functionality</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom right, #202020, #3a3a3a);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .homing-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .label-box {
      width: 200px;
      height: 70px;
      background: #444;
      color: #fff;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      position: relative;
      transition: background-color 0.3s ease;
    }
    .label-box:hover {
      background-color: #4b2e2e;
    }
    .unit-button {
      width: 150px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 16px;
      background: linear-gradient(145deg, #8b0000, #4b2e2e);
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: background 0.3s ease;
    }
    .unit-button:hover {
      background: linear-gradient(145deg, #b22222, #5e3e3e);
    }
    .unit-button.unit1 { margin-right: 30px; }
    .unit-button.unit2 { margin-left: 30px; }
    .unit-button.loading { background: linear-gradient(145deg, #ffd700, #ff8c00); }
    /* Connecting lines */
    .connection-line {
      width: 70px;
      height: 2px;
      position: absolute;
    }
    .connection-left {
      background: linear-gradient(145deg, #444, #01ec01);

      left: 23%;
    }
    .connection-right {
      background: linear-gradient(145deg,#01ec01, #444);

      right: 24%;
      z-index: 1;
    }
    .label-box .loading-bar {
      position: absolute;
      bottom: 10px;
      left: 0;
      width: 0%;
      height: 5px;
      background: linear-gradient(90deg, rgb(231, 132, 3), rgb(204, 23, 10));
      transition: width 1s ease;
    }
  </style>
</head>
<body>
  <div class="homing-container">
    <div class="unit-button unit1" onclick="initHoming('Unit 1')">UNIT 1</div>

    <div class="label-box">
      <div class="loading-bar"></div>
      <span>HOMING</span>
    </div>

    <!-- Connection lines -->
    <div class="connection-line connection-left"></div>
    <div class="connection-line connection-right"></div>

    <!-- Buttons -->
    <div class="unit-button unit2" onclick="initHoming('Unit 2')">UNIT 2</div>
  </div>

  <script>
    const labelBox = document.querySelector('.label-box');
    const loadingBar = document.querySelector('.loading-bar');
    const unitButtons = document.querySelectorAll('.unit-button');

    function initHoming(unit) {
      labelBox.querySelector('span').textContent = `${unit} homing init.`;
      // Show loading bar animation
      loadingBar.style.width = '100%';
      // Add loading effect to button
      const button = document.querySelector(`.unit-button.${unit.toLowerCase().replace(' ', '')}`);
      button.classList.add('loading');
      // Disable buttons during loading
      unitButtons.forEach(btn => btn.style.pointerEvents = 'none');
      
      // Wait for 2 seconds before resetting
      setTimeout(() => {
        labelBox.querySelector('span').textContent = 'HOMING';
        loadingBar.style.width = '0%';  // Reset loading bar
        button.classList.remove('loading');
        // Enable buttons again
        unitButtons.forEach(btn => btn.style.pointerEvents = 'auto');
      }, 1000);
    }
  </script>
</body>
</html>
