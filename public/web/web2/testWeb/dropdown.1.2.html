<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylized Menu with Threads</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      /* align-items: center;  */
      height: 100vh;
      background: linear-gradient(to bottom right, #202020, #3a3a3a);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .menu-container {
      position: relative;
      text-align: center;
    }
    .menu-box {
      width: 200px;
      height: 70px;
      background: #922b19;
      color: #fff;
      font-size: 18px;
      font-weight: bolder;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      transform: translateY(45px);
      transition: transform 0.3s ease, background-color 0.3s ease;
      z-index: 10;
    }
    .menu-box:hover {
      background-color: #4b2e2e;
    }
    .option {
      position: absolute;
      width: 150px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 16px;
      background: linear-gradient(145deg, #8b0000, #4b2e2e);
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      transform: scale(0) translate(0, 0);
      transition: transform 0.6s ease, opacity 0.4s ease;
      opacity: 0;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .option:hover {
      background: linear-gradient(145deg, #b22222, #5e3e3e);
    }
    .menu-container.active .option {
      opacity: 1;
      transform: scale(1) translate(var(--x), var(--y));
    }
    .option.spm1 { --x: -120px; --y: -70px; }
    .option.spm2 { --x: -160px; --y: 50px; }
    .option.spm3 { --x: 210px; --y: -70px; }
    .option.spm4 { --x: 170px; --y: 50px; }
    .thread {
      position: absolute;
      width: 2px;
      background: #000;
      transform-origin: center top;
      transform: scaleY(0);
      transition: transform 0.6s ease;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <div class="menu-box" onclick="toggleMenu()">Select SPM</div>
    <!-- Threads -->
    <div class="thread spm1"></div>
    <div class="thread spm2"></div>
    <div class="thread spm3"></div>
    <div class="thread spm4"></div>
    <!-- Options -->
    <div class="option spm1" onclick="handleOption('SPM1')">SPM1</div>
    <div class="option spm2" onclick="handleOption('SPM2')">SPM2</div>
    <div class="option spm3" onclick="handleOption('SPM3')">SPM3</div>
    <div class="option spm4" onclick="handleOption('SPM4')">SPM4</div>
  </div>

  <script>
    const menuContainer = document.querySelector('.menu-container');
    const menuBox = document.querySelector('.menu-box');
    const options = document.querySelectorAll('.option');

    function toggleMenu() {
      if (menuContainer.classList.contains('active')) {
        resetMenu();
      } else {
        menuContainer.classList.add('active');
      }
    }

    function handleOption(option) {
      // Update button text
      menuBox.textContent = `Selected ${option}`;
      // Reset options
      resetMenu();
    }

    function resetMenu() {
      menuContainer.classList.remove('active');
      // Reset button text if no option is selected
      if (!menuBox.textContent.startsWith('Selected')) {
        menuBox.textContent = 'Select SPM';
      }
    }
  </script>
</body>
</html>
