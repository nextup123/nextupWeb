<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Controller</title>
    <link rel="stylesheet" href="styles/task_style.css">
    <link rel="stylesheet" href="styles/path_view.css">
    <link rel="icon" href="./image/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/toggle_button.css">
    <link rel="stylesheet" href="styles/toggle_v2.css">

</head>
<h1>Robot Controller</h1>
<div class="container">
    <div class="path-management">
        <h2>Path Management</h2>
        <div class="columns">
            <div class="column left additional-column">
                <div class="button-item">
                    <button class="btn btnpush" id="add_path">Add Path</button>
                </div>
                <div class="button-item">
                    <button class="btn btnpush" id="clear_last">Clear Last</button>
                </div>
                <div class="button-item">
                    <button class="btn btnpush" id="clear_all">Clear All</button>
                </div>
                <div class="button-item">
                    <button class="btn btnpush" id="execute">Execute</button>
                </div>
                <div class="button-item">
                    <button class="btn btnpush" id="repeat">Repeat</button>
                </div>
                <div class="button-item">
                    <button class="btn btnpush" id="default">Default</button>
                </div>
            </div>
            <div class="path-container">
                <h2>Path Segments</h2>
                <hr>
                <div class="item-list" id="itemList"></div>
            </div>
        </div>
    </div>

    <div class="servo-node-controller">
        <h2>Servo Node Controller</h2>
        <div class="columns">
            <div class="column left">
                <div class="joint-item">
                    <label class="joint_name" for="join1">J1:</label>
                    <button class="btna btnplus" id="j1_plus">+</button>
                    <button class="btna btnminus" id="j1_minus">-</button>
                    <label class="subs_value" id="j1val" for="">0.0</label>
                </div>

                <div class="joint-item">
                    <label class="joint_name" for="join2">J2:</label>
                    <button class="btna btnplus" id="j2_plus">+</button>
                    <button class="btna btnminus" id="j2_minus">-</button>
                    <label class="subs_value" id="j2val" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="join3">J3:</label>
                    <button class="btna btnplus" id="j3_plus">+</button>
                    <button class="btna btnminus" id="j3_minus">-</button>
                    <label class="subs_value" id="j3val" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="join4">J4:</label>
                    <button class="btna btnplus" id="j4_plus">+</button>
                    <button class="btna btnminus" id="j4_minus">-</button>
                    <label class="subs_value" id="j4val" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="join5">J5:</label>
                    <button class="btna btnplus" id="j5_plus">+</button>
                    <button class="btna btnminus" id="j5_minus">-</button>
                    <label class="subs_value" id="j5val" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="join6">J6:</label>
                    <button class="btna btnplus" id="j6_plus">+</button>
                    <button class="btna btnminus" id="j6_minus">-</button>
                    <label class="subs_value" id="j6val" for="">0.0</label>
                </div>
            </div>

            <div class="vertical-line"></div>
            <div class="column right">
                <div class="joint-item">
                    <label class="joint_name" for="x">X:</label>
                    <button class="btna btnplus" id="cx_plus">+</button>
                    <button class="btna btnminus" id="cx_minus">-</button>
                    <label class="subs_value" id="xval" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="y">Y:</label>
                    <button class="btna btnplus" id="cy_plus">+</button>
                    <button class="btna btnminus" id="cy_minus">-</button>
                    <label class="subs_value" id="yval" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="z">Z:</label>
                    <button class="btna btnplus" id="cz_plus">+</button>
                    <button class="btna btnminus" id="cz_minus">-</button>
                    <label class="subs_value" id="zval" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="r">R:</label>
                    <button class="btna btnplus" id="cr_plus">+</button>
                    <button class="btna btnminus" id="cr_minus">-</button>
                    <label class="subs_value" id="rval" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="p">P:</label>
                    <button class="btna btnplus" id="cp_plus">+</button>
                    <button class="btna btnminus" id="cp_minus">-</button>
                    <label class="subs_value" id="pval" for="">0.0</label>
                </div>
                <div class="joint-item">
                    <label class="joint_name" for="w">W:</label>
                    <button class="btna btnplus" id="cw_plus">+</button>
                    <button class="btna btnminus" id="cw_minus">-</button>
                    <label class="subs_value" id="wval" for="">0.0</label>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="button_container">
    <div class="toggle_v2">
        <div class="left_side">
            <h3>Gripper:</h3>
        </div>
        <div class="right_side_button">
            <div class="toggle-button-cover">
                <div id="button-3" class="button r">
                    <input id="gripper" class="checkbox" type="checkbox">
                    <div class="knobs"></div>
                    <div class="layer"></div>
                </div>
            </div> 
        </div>
    
        <div class="left_side">
            <h3>Mode:</h3>
        </div>
        <div class="right_side_button">
            <div class="toggle-button-cover">
                <div id="button-4" class="button r">
                    <input id="switch_mode_1" class="checkbox" type="checkbox">
                    <div class="knobs"></div>
                    <div class="layer"></div>
                </div>
            </div> 
        </div>
    
        <div class="left_side">
            <h3>Frame:</h3>
        </div>
        <div class="right_side_button">
            <div class="toggle-button-cover">
                <div id="button-5" class="button r">
                    <input id="switch_mode_2" class="checkbox" type="checkbox">
                    <div class="knobs"></div>
                    <div class="layer"></div>
                </div>
            </div> 
        </div>

        <div class="left_side">
            <h3>Cobot:</h3>
        </div>
        <div class="right_side_button">
            <div class="toggle-button-cover">
                <div id="button-6" class="button r">
                    <input id="play_pause" class="checkbox" type="checkbox">
                    <div class="knobs"></div>
                    <div class="layer"></div>
                </div>
            </div> 
        </div>
    </div>
    </div> 





<script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="scripts/script.js"></script>
<script src="scripts/path_commands.js"></script>
<script src="scripts/toggle_buttons.js"></script>
<script src="scripts/path_view.js"></script>
<script src="scripts/subscriptions.js"></script>

</body>

</html>
